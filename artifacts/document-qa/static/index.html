<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Q&A</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="panel panel-left">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>Document Q&amp;A</h1>
          <p class="brand-sub">Ask your PDF anything</p>
        </div>
      </div>

      <div class="upload-card">
        <div class="upload-glow"></div>
        <p class="upload-label">Your document</p>
        <label class="upload-btn" for="pdf-input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 16V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Upload PDF</span>
        </label>
        <input id="pdf-input" type="file" accept="application/pdf,.pdf" hidden />

        <div id="upload-status" class="upload-status upload-status-empty">
          <span class="status-dot"></span>
          <span id="upload-status-text">No document uploaded yet</span>
        </div>
      </div>

      <div class="hint-card">
        <p>Drop in a PDF, then ask questions about it in the chat. Your document stays on this session only.</p>
      </div>

      <div class="left-footer">
        <span class="footer-dot"></span>
        <span class="footer-dot"></span>
        <span class="footer-dot"></span>
      </div>
    </aside>

    <main class="panel panel-right">
      <div class="chat-header">
        <div>
          <h2>Chat</h2>
          <p id="chat-subtitle" class="chat-subtitle">Upload a PDF to get started</p>
        </div>
      </div>

      <div id="chat-window" class="chat-window">
        <div class="message message-ai">
          <div class="bubble bubble-ai">
            Hi! Upload a PDF on the left, and I'll help you find answers inside it.
          </div>
        </div>
      </div>

      <form id="chat-form" class="chat-input-bar">
        <input
          id="chat-input"
          type="text"
          placeholder="Ask something about your document..."
          autocomplete="off"
          disabled
        />
        <button id="send-btn" type="submit" disabled>
          <span class="send-label">Send</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 12H20M20 12L14 6M20 12L14 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </main>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
